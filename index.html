.topbar { background: white; padding: 12px 16px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
.back-btn { background: #f1f5f9; border: none; padding: 8px 16px; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: 600; }
.back-btn:active { background: #e2e8f0; }
.topbar-title { font-size: 16px; font-weight: 600; color: #0f172a; }
.entry-body { padding: 16px; }
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.meta-field { display: flex; flex-direction: column; gap: 6px; }
.meta-label { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.meta-input { padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; background: white; transition: border 0.2s; }
.meta-input:focus { outline: none; border-color: #2563eb; }
.param-section { margin: 20px 0; }
.param-label { font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid #e2e8f0; text-transform: uppercase; letter-spacing: 0.5px; }
.param-row { background: white; border: 1px solid #e2e8f0; padding: 12px; display: grid; grid-template-columns: 60px 1fr 100px; gap: 10px; align-items: center; }
.param-row:first-child { border-radius: 8px 8px 0 0; }
.param-row:last-child { border-radius: 0 0 8px 8px; border-bottom-width: 1px; }
.param-row:not(:last-child) { border-bottom: none; }
.param-id { font-weight: 700; font-size: 16px; color: #1e293b; }
.param-info { font-size: 11px; color: #64748b; line-height: 1.4; }
.param-input { padding: 10px; border: 2px solid #cbd5e1; border-radius: 6px; text-align: right; font-size: 15px; font-weight: 600; transition: border 0.2s; }
.param-input:focus { outline: none; border-color: #2563eb; }
.save-btn { width: 100%; padding: 16px; background: #2563eb; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 12px rgba(37,99,235,0.3); transition: all 0.2s; }

@keyframes slideUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

// Sync to database
async function syncToDatabase(equipmentKey, record) {
  if (!USE_SYNC || !supabaseClient) return;
  
  try {
    const equipment = EQUIPMENT[equipmentKey];
    const { error } = await supabaseClient
      .from('measurements')
      .insert({
        equipment_key: equipmentKey,
        equipment_type: equipment ? equipment.type : 'Unknown',
        date: record.date,
        inspector: record.inspector || null,
        production: record.prod ? parseFloat(record.prod) : null,
        hours: record.hours ? parseFloat(record.hours) : null,
        values: record.v || {}
      });
    
    if (error) {
      console.error('DB sync error:', error);
      showToast('⚠ Database sync xətası');
    } else {
      console.log('✓ Synced to database');
    }
  } catch(err) {
    console.error('Sync failed:', err);
  }
}

// Load from database
async function loadFromDatabase() {
  if (!USE_SYNC || !supabaseClient) {
    console.log('Database sync disabled');
    return;
  }
  
  try {
    console.log('Loading from database...');
    const { data, error } = await supabaseClient
      .from('measurements')
      .select('*')
      .order('created_at', { ascending: true });
    
    if (error) {
      console.error('Load error:', error);
      return;
    }
    
    if (!data || data.length === 0) {
      console.log('No data in database');
      return;
    }
    
    const dbRecords = {};
    for (const row of data) {
      if (!dbRecords[row.equipment_key]) {
        dbRecords[row.equipment_key] = [];
      }
      
      dbRecords[row.equipment_key].push({
        date: row.date,
        inspector: row.inspector,
        prod: row.production,
        hours: row.hours,
        v: row.values,
        ts: new Date(row.created_at).getTime()
      });
    }
    
    for (const [key, records] of Object.entries(dbRecords)) {
      if (!DB[key]) {
        DB[key] = [];
      }
      
      for (const rec of records) {
        const exists = DB[key].some(local => 
          local.date === rec.date && Math.abs(local.ts - rec.ts) < 1000
        );
        if (!exists) {
          DB[key].push(rec);
        }
      }
      
      DB[key].sort((a, b) => a.ts - b.ts);
    }
    
    console.log('✓ Loaded from database:', data.length, 'records');
    save();
    
  } catch (err) {
    console.error('Database load failed:', err);
  }
}

  const v = {};
  let hasAny = false;
  for (let i = 0; i < eq.params.length; i++) {
    const p = eq.params[i];
    const el = document.getElementById('pi-' + p.id);
    if (el && el.value !== '') {
      v[p.id] = parseFloat(el.value);
      hasAny = true;
    }
  }
  
  if (!hasAny) {
    showToast('Ən azı 1 ölçüm daxil edin');
    return;
  }
  
  if (!DB[key]) DB[key] = [];
  const record = { date: date, inspector: inspector, v: v, ts: Date.now() };
  DB[key].push(record);
  save();
  
  if (USE_SYNC) {
    syncToDatabase(key, record);
  }
  
  showToast('✓ Ölçüm saxlandı');
  setTimeout(function() {
    goBack();
  }, 1200);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

// Init
if (USE_SYNC && supabaseClient) {
  loadFromDatabase().then(() => {
    renderHome();
    console.log('✓ App loaded v7:', ALL_UNITS.length, 'equipment');
  });
} else {
  renderHome();
  console.log('✓ App loaded v7:', ALL_UNITS.length, 'equipment');
}

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function() {});
}
