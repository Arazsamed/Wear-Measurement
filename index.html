<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f5a623">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Aşınma">
<link rel="manifest" href="./manifest.json">
<title>Aşınma Ölçüm Sistemi</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #141720;
  --surface2: #1c2130;
  --border: #252c3d;
  --border2: #323d55;
  --text: #e8ecf4;
  --dim: #7a8299;
  --muted: #3d4560;
  --accent: #f5a623;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --blue: #60a5fa;
  --red-bg: rgba(248,113,113,0.10);
  --yellow-bg: rgba(251,191,36,0.10);
  --green-bg: rgba(52,211,153,0.10);
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
}

/* ── SCREENS ─────────────────────────────── */
.screen { display: none; flex-direction: column; height: 100vh; height: 100dvh; }
.screen.active { display: flex; }

/* ── TOPBAR ──────────────────────────────── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 10px) 16px 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 56px;
  flex-shrink: 0;
  z-index: 10;
}
.topbar-back {
  width: 36px; height: 36px;
  background: var(--surface2);
  border: none; border-radius: 50%;
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.topbar-title { font-family: var(--mono); font-size: 14px; font-weight: 600; flex: 1; }
.topbar-sub { font-size: 11px; color: var(--dim); font-family: var(--mono); }

/* ── SCROLL BODY ─────────────────────────── */
.scroll-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
.scroll-body::-webkit-scrollbar { display: none; }

/* ── BOTTOM NAV ──────────────────────────── */
.bottom-nav {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 8px 0 calc(var(--safe-bottom) + 8px);
  display: flex;
  flex-shrink: 0;
}
.nav-btn {
  flex: 1;
  background: none;
  border: none;
  color: var(--dim);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.5px;
  padding: 6px 4px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: color 0.15s;
}
.nav-btn .nav-icon { font-size: 20px; line-height: 1; }
.nav-btn.active { color: var(--accent); }

/* ── HOME SCREEN ─────────────────────────── */
.home-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 16px) 16px 16px;
  flex-shrink: 0;
}
.home-logo {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
}
.logo-box {
  width: 40px; height: 40px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-weight: 600; font-size: 14px; color: #000;
}
.home-title { font-family: var(--mono); font-size: 15px; font-weight: 600; }
.home-sub { font-size: 11px; color: var(--dim); font-family: var(--mono); margin-top: 2px; }

.search-box {
  background: var(--surface2);
  border: 1px solid var(--border2);
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
}
.search-box input {
  background: none; border: none; outline: none;
  color: var(--text); font-family: var(--mono); font-size: 13px;
  flex: 1; width: 100%;
}
.search-box input::placeholder { color: var(--muted); }
.search-icon { color: var(--dim); font-size: 16px; }

/* ── UNIT LIST ───────────────────────────── */
.unit-list { padding: 12px 16px 16px; display: flex; flex-direction: column; gap: 8px; }
.unit-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border2);
  padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.unit-card:active { background: var(--surface2); transform: scale(0.99); }
.unit-card.status-ok { border-left-color: var(--green); }
.unit-card.status-warn { border-left-color: var(--yellow); }
.unit-card.status-over { border-left-color: var(--red); }
.unit-card-left {}
.unit-card-name { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--text); }
.unit-card-meta { font-size: 11px; color: var(--dim); margin-top: 3px; font-family: var(--mono); }
.unit-card-right { display: flex; align-items: center; gap: 10px; }
.status-pill {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  padding: 3px 8px; letter-spacing: 0.5px;
}
.pill-ok { background: var(--green-bg); color: var(--green); }
.pill-warn { background: var(--yellow-bg); color: var(--yellow); }
.pill-over { background: var(--red-bg); color: var(--red); }
.pill-empty { background: var(--surface2); color: var(--muted); }
.chevron { color: var(--muted); font-size: 18px; }

/* ── SECTION GROUPS ──────────────────────── */
.section-group { margin: 0 16px 20px; }
.section-label {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  color: var(--dim); text-transform: uppercase; letter-spacing: 1.5px;
  padding: 12px 0 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}

/* ── PARAM ROWS ──────────────────────────── */
.param-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  padding: 12px 14px;
  display: grid;
  grid-template-columns: 60px 1fr auto;
  align-items: center;
  gap: 10px;
}
.param-row:last-child { }
.param-label { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--text); }
.param-info { }
.param-limit { font-size: 11px; color: var(--dim); font-family: var(--mono); }
.param-nominal { font-size: 10px; color: var(--muted); font-family: var(--mono); }
.param-input-wrap { display: flex; align-items: center; gap: 6px; }
.param-input {
  background: var(--surface2);
  border: 1.5px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 16px;
  padding: 10px 10px;
  width: 100px;
  outline: none;
  text-align: right;
  transition: border-color 0.15s, background 0.15s;
  -webkit-appearance: none;
  border-radius: 0;
}
.param-input:focus { border-color: var(--accent); background: rgba(245,166,35,0.06); }
.param-input.s-ok { border-color: var(--green); background: var(--green-bg); }
.param-input.s-warn { border-color: var(--yellow); background: var(--yellow-bg); }
.param-input.s-over { border-color: var(--red); background: var(--red-bg); color: var(--red); }
.status-icon { font-size: 18px; width: 22px; text-align: center; }

/* ── META FIELDS ─────────────────────────── */
.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 0 16px 20px;
}
.meta-field { display: flex; flex-direction: column; gap: 5px; }
.meta-label { font-size: 10px; color: var(--dim); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; }
.meta-input {
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  padding: 10px 12px;
  outline: none;
  -webkit-appearance: none;
  border-radius: 0;
  width: 100%;
}
.meta-input:focus { border-color: var(--accent); }
.meta-full { grid-column: 1 / -1; }

/* ── ALERT BANNER ────────────────────────── */
.alert-strip {
  margin: 12px 16px 0;
  padding: 10px 14px;
  font-family: var(--mono); font-size: 12px;
  display: flex; align-items: center; gap: 10px;
  border-left: 3px solid var(--red);
  background: var(--red-bg); color: var(--red);
}
.alert-strip.warn { border-color: var(--yellow); background: var(--yellow-bg); color: var(--yellow); }

/* ── SAVE BUTTON ─────────────────────────── */
.save-bar {
  padding: 12px 16px calc(var(--safe-bottom) + 12px);
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.save-btn {
  width: 100%; padding: 14px;
  background: var(--accent); color: #000;
  border: none; font-family: var(--mono); font-size: 14px; font-weight: 600;
  cursor: pointer; letter-spacing: 0.5px;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.save-btn:active { background: #d4891a; }
.save-btn:disabled { background: var(--surface2); color: var(--muted); }

/* ── HISTORY SCREEN ──────────────────────── */
.history-list { padding: 12px 16px 80px; display: flex; flex-direction: column; gap: 10px; }
.history-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 0;
  overflow: hidden;
}
.history-card-header {
  padding: 12px 14px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.history-date { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); }
.history-meta { font-size: 11px; color: var(--dim); font-family: var(--mono); margin-top: 2px; }
.history-card-body { padding: 10px 14px; display: flex; flex-wrap: wrap; gap: 8px; }
.history-param {
  display: flex; flex-direction: column; gap: 2px;
  background: var(--surface2); padding: 6px 10px; min-width: 72px;
}
.hp-label { font-size: 10px; color: var(--dim); font-family: var(--mono); }
.hp-val { font-family: var(--mono); font-size: 14px; font-weight: 600; }
.hp-ok { color: var(--green); }
.hp-warn { color: var(--yellow); }
.hp-over { color: var(--red); }
.hp-empty { color: var(--muted); }
.delete-btn {
  background: var(--red-bg); border: none; color: var(--red);
  font-family: var(--mono); font-size: 11px; padding: 5px 10px;
  cursor: pointer;
}

/* ── EXPORT SCREEN ───────────────────────── */
.export-body { padding: 20px 16px 80px; display: flex; flex-direction: column; gap: 16px; }
.export-card {
  background: var(--surface); border: 1px solid var(--border);
  padding: 16px;
}
.export-card-title { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.export-card-sub { font-size: 12px; color: var(--dim); margin-bottom: 14px; }
.export-btn {
  width: 100%; padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text); font-family: var(--mono); font-size: 13px; font-weight: 600;
  cursor: pointer; letter-spacing: 0.5px;
  transition: all 0.15s;
}
.export-btn:active { background: var(--border2); }
.export-btn.primary { background: var(--accent); color: #000; border: none; }
.export-btn.danger { background: var(--red-bg); color: var(--red); border-color: rgba(248,113,113,0.2); }

.unit-select {
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); font-family: var(--mono); font-size: 13px;
  padding: 10px 12px; width: 100%; outline: none; margin-bottom: 10px;
  -webkit-appearance: none; border-radius: 0;
}
.stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.stat-box { background: var(--surface2); padding: 12px; text-align: center; }
.stat-n { font-family: var(--mono); font-size: 22px; font-weight: 600; }
.stat-l { font-size: 10px; color: var(--dim); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

/* ── INSTALL BANNER ──────────────────────── */
.install-banner {
  margin: 12px 16px 0;
  background: rgba(245,166,35,0.12);
  border: 1px solid rgba(245,166,35,0.3);
  padding: 12px 14px;
  display: flex; align-items: center; gap: 12px;
}
.install-banner-text { flex: 1; font-size: 12px; color: var(--accent); font-family: var(--mono); }
.install-btn {
  background: var(--accent); color: #000;
  border: none; font-family: var(--mono); font-size: 11px; font-weight: 600;
  padding: 7px 12px; cursor: pointer; white-space: nowrap;
}

/* ── TOAST ───────────────────────────────── */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface);
  border: 1px solid var(--border2);
  padding: 10px 20px;
  font-family: var(--mono); font-size: 13px;
  z-index: 9999; white-space: nowrap;
  opacity: 0; transition: all 0.25s cubic-bezier(.16,1,.3,1);
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.t-ok { border-left: 3px solid var(--green); color: var(--green); }
.toast.t-err { border-left: 3px solid var(--red); color: var(--red); }

/* ── EMPTY ───────────────────────────────── */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--muted); font-family: var(--mono); font-size: 12px;
}
.empty-icon { font-size: 40px; margin-bottom: 12px; display: block; opacity: 0.4; }
</style>
</head>
<body>

<!-- ████ SCREEN 1: HOME / UNIT LIST ████ -->
<div class="screen active" id="screen-home">
  <div class="home-header">
    <div class="home-logo">
      <div class="logo-box">NS</div>
      <div>
        <div class="home-title">Aşınma Ölçüm</div>
        <div class="home-sub">NORM Sement · NSZ-GMP-FRM-PL-011</div>
      </div>
    </div>
    <div class="search-box">
      <span class="search-icon">⊘</span>
      <input type="search" placeholder="Avadanlıq axtar..." id="search-input" oninput="filterUnits(this.value)">
    </div>
  </div>
  <div id="install-banner-wrap"></div>
  <div class="scroll-body">
    <div class="unit-list" id="unit-list"></div>
  </div>
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="showScreen('home')">
      <span class="nav-icon">⛓</span>Avadanlıqlar
    </button>
    <button class="nav-btn" onclick="showScreen('export')">
      <span class="nav-icon">↓</span>Export
    </button>
  </div>
</div>

<!-- ████ SCREEN 2: MEASUREMENT ENTRY ████ -->
<div class="screen" id="screen-entry">
  <div class="topbar">
    <button class="topbar-back" onclick="goBack()">‹</button>
    <div>
      <div class="topbar-title" id="entry-title">—</div>
      <div class="topbar-sub">Yeni ölçüm daxil et</div>
    </div>
  </div>
  <div class="scroll-body" id="entry-body"></div>
  <div class="save-bar">
    <button class="save-btn" id="save-btn" onclick="saveEntry()">✓  Ölçümü Saxla</button>
  </div>
</div>

<!-- ████ SCREEN 3: HISTORY ████ -->
<div class="screen" id="screen-history">
  <div class="topbar">
    <button class="topbar-back" onclick="goBack()">‹</button>
    <div>
      <div class="topbar-title" id="history-title">Tarixçə</div>
      <div class="topbar-sub" id="history-sub">—</div>
    </div>
  </div>
  <div class="scroll-body">
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<!-- ████ SCREEN 4: EXPORT ████ -->
<div class="screen" id="screen-export">
  <div class="home-header" style="padding-bottom:12px">
    <div class="home-logo" style="margin-bottom:0">
      <div class="logo-box">↓</div>
      <div>
        <div class="home-title">Export / Hesabat</div>
        <div class="home-sub">CSV faylı yarat və göndər</div>
      </div>
    </div>
  </div>
  <div class="scroll-body">
    <div class="export-body" id="export-body"></div>
  </div>
  <div class="bottom-nav">
    <button class="nav-btn" onclick="showScreen('home')">
      <span class="nav-icon">⛓</span>Avadanlıqlar
    </button>
    <button class="nav-btn active" onclick="showScreen('export')">
      <span class="nav-icon">↓</span>Export
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  DATA DEFINITIONS
// ═══════════════════════════════════════════
const SECTIONS_TEMPLATE = {
  chain_loaded: {
    name: "⛓ Zəncir — Dolu Tərəf",
    params: [
      { id:"A",  label:"A",  nominal:null, limitAbs:null, limitDelta:null, limitDir:"min", unit:"mm" },
      { id:"B",  label:"B",  nominal:null, limitAbs:null, limitDelta:null, limitDir:"min", unit:"mm" },
      { id:"D",  label:"D",  nominal:null, limitAbs:null, limitDelta:null, limitDir:"min", unit:"mm" },
      { id:"E",  label:"E",  nominal:null, limitAbs:null, limitDelta:10,   limitDir:"min", unit:"mm", note:"Max aşınma: 10mm" },
      { id:"E1", label:"E1", nominal:null, limitAbs:null, limitDelta:null, limitDir:"min", unit:"mm" },
      { id:"H",  label:"H",  nominal:null, limitAbs:null, limitDelta:null, limitDir:"min", unit:"mm" }
    ]
  },
  chain_empty: {
    name: "⛓ Zəncir — Boş Tərəf",
    params: [
      { id:"p1", label:"p1", nominal:180, limitAbs:250, limitDelta:null, limitDir:"max", unit:"mm", note:"Limit: 250mm" },
      { id:"p2", label:"p2", nominal:180, limitAbs:250, limitDelta:null, limitDir:"max", unit:"mm", note:"Limit: 250mm" },
      { id:"a",  label:"a",  nominal:240, limitAbs:250, limitDelta:null, limitDir:"max", unit:"mm", note:"Limit: 250mm" },
      { id:"d",  label:"d",  nominal:60,  limitAbs:null, limitDelta:null, limitDir:"min", unit:"mm" },
      { id:"E2", label:"E2", nominal:60,  limitAbs:null, limitDelta:null, limitDir:"min", unit:"mm" }
    ]
  },
  driving: {
    name: "⚙ Aparan Seqment",
    params: [
      { id:"X_drv", label:"X", nominal:null, limitAbs:3, limitDelta:null, limitDir:"max", unit:"mm", note:"Limit: 3mm" }
    ]
  },
  tension: {
    name: "⚙ Gərgi Seqmenti",
    params: [
      { id:"X_ten", label:"X", nominal:null, limitAbs:3, limitDelta:null, limitDir:"max", unit:"mm", note:"Limit: 3mm" }
    ]
  }
};

// Unit-specific nominal overrides
const UNIT_NOMINALS = {
  "491CV3": { A:45, D:245, E:245, E1:200, H:20 },
  "491CV2": { A:36, D:187.5, E:187.5, E1:150, H:20.5 },
  "491CV1": { A:36, D:187.5, E:187.5, E1:150, H:20.5 },
  "641CV1": { A:null, B:10, E:187, E1:166 },
  "642CV1": { A:null, B:9.2, E:187, E1:167 },
  "643CV1": { A:34.5, B:10, E:187.5, E1:150 },
  "644CV1": { A:34.5, B:10, D:187, E:187, E1:150 },
};

// Build final unit list
const ALL_UNITS = [
  "491CV3","491CV2","491CV1",
  "641CV1","642CV1","643CV1","644CV1",
  "391CV1","391CV2","391CV3","391CV4","391CV5","391CV6","391CV7","391CV8",
  "FU 270","FU 350","FU 410"
];

function getUnitSections(unitKey) {
  // Deep clone template
  const secs = JSON.parse(JSON.stringify(SECTIONS_TEMPLATE));
  const nom = UNIT_NOMINALS[unitKey] || {};
  for(const sec of Object.values(secs)) {
    sec.params = sec.params.filter(p => {
      // Hide B for units that don't use it
      if(p.id === 'B' && !['641CV1','642CV1','643CV1','644CV1'].includes(unitKey)) return false;
      return true;
    }).map(p => {
      if(nom[p.label] !== undefined) p.nominal = nom[p.label];
      return p;
    });
  }
  // Remove empty sections for FU units (they don't have chain_empty detail)
  if(unitKey.startsWith('FU')) {
    secs.chain_empty.params = secs.chain_empty.params.slice(0,2); // only p1, p2
  }
  return secs;
}

// ═══════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════
function load() {
  try { return JSON.parse(localStorage.getItem('wearDB') || '{}'); } catch(e) { return {}; }
}
function save(db) { localStorage.setItem('wearDB', JSON.stringify(db)); }
let DB = load();

// ═══════════════════════════════════════════
//  STATUS LOGIC
// ═══════════════════════════════════════════
function paramStatus(p, val) {
  if(val === null || val === '' || val === undefined) return 'empty';
  const v = parseFloat(val);
  if(isNaN(v)) return 'empty';

  if(p.limitAbs !== null) {
    if(p.limitDir === 'max') {
      if(v >= p.limitAbs) return 'over';
      if(v >= p.limitAbs * 0.88) return 'warn';
    }
  }
  if(p.limitDelta !== null && p.nominal !== null) {
    const wear = Math.abs(v - p.nominal);
    if(wear >= p.limitDelta) return 'over';
    if(wear >= p.limitDelta * 0.75) return 'warn';
  }
  return 'ok';
}

function unitStatus(key) {
  const recs = DB[key] || [];
  if(!recs.length) return 'empty';
  const last = recs[recs.length-1];
  const secs = getUnitSections(key);
  let over=false, warn=false;
  for(const sec of Object.values(secs))
    for(const p of sec.params) {
      const s = paramStatus(p, last.v && last.v[p.id]);
      if(s==='over') over=true;
      else if(s==='warn') warn=true;
    }
  return over?'over':warn?'warn':'ok';
}

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
let navStack = ['home'];
let currentUnit = null;

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if(name === 'home') renderHome();
  if(name === 'export') renderExport();
}

function goBack() {
  navStack.pop();
  const prev = navStack[navStack.length-1] || 'home';
  if(prev === 'home') showScreen('home');
  else if(prev === 'history') { showScreen('history'); }
  else showScreen(prev);
}

function openUnit(key) {
  currentUnit = key;
  navStack.push('entry');
  renderEntry(key);
  showScreen('entry');
}

function openHistory(key) {
  currentUnit = key;
  navStack.push('history');
  renderHistory(key);
  showScreen('history');
}

// ═══════════════════════════════════════════
//  HOME RENDER
// ═══════════════════════════════════════════
function renderHome() {
  const list = document.getElementById('unit-list');
  const q = (document.getElementById('search-input')||{}).value || '';
  const filtered = ALL_UNITS.filter(k => k.toLowerCase().includes(q.toLowerCase()));

  if(!filtered.length) {
    list.innerHTML = '<div class="empty-state"><span class="empty-icon">🔍</span>Nəticə tapılmadı</div>';
    return;
  }

  list.innerHTML = filtered.map(key => {
    const st = unitStatus(key);
    const recs = DB[key] || [];
    const lastDate = recs.length ? recs[recs.length-1].date : null;
    const pillClass = {ok:'pill-ok',warn:'pill-warn',over:'pill-over',empty:'pill-empty'}[st];
    const pillText = {ok:'OK',warn:'!',over:'⚠ LİMİT',empty:'—'}[st];
    const cardClass = st === 'empty' ? '' : `status-${st}`;
    return `
      <div class="unit-card ${cardClass}" onclick="openUnit('${key}')">
        <div class="unit-card-left">
          <div class="unit-card-name">${key}</div>
          <div class="unit-card-meta">${recs.length} ölçüm${lastDate ? ' · ' + lastDate : ''}</div>
        </div>
        <div class="unit-card-right">
          <span class="status-pill ${pillClass}">${pillText}</span>
          <span class="chevron">›</span>
        </div>
      </div>`;
  }).join('');
}

function filterUnits(q) { renderHome(); }

// ═══════════════════════════════════════════
//  ENTRY RENDER
// ═══════════════════════════════════════════
let entryInputs = {};

function renderEntry(key) {
  entryInputs = {};
  document.getElementById('entry-title').textContent = key;
  const secs = getUnitSections(key);
  const st = unitStatus(key);

  let alert = '';
  if(st === 'over') alert = `<div class="alert-strip">⚠ Son ölçümdə limit KEÇILMIŞDIR!</div>`;
  else if(st === 'warn') alert = `<div class="alert-strip warn">! Son ölçümdə limitə YAXINLAŞMA var.</div>`;

  const today = new Date().toISOString().split('T')[0];

  let html = alert + `
    <div style="height:12px"></div>
    <div class="meta-grid">
      <div class="meta-field">
        <div class="meta-label">Tarix</div>
        <input type="date" class="meta-input" id="m-date" value="${today}">
      </div>
      <div class="meta-field">
        <div class="meta-label">Müfəttiş</div>
        <input type="text" class="meta-input" id="m-inspector" placeholder="Ad Soyad">
      </div>
      <div class="meta-field">
        <div class="meta-label">İstehsal (ton)</div>
        <input type="number" inputmode="decimal" class="meta-input" id="m-prod" placeholder="0">
      </div>
      <div class="meta-field">
        <div class="meta-label">İşləmə Saatı</div>
        <input type="number" inputmode="decimal" class="meta-input" id="m-hours" placeholder="0">
      </div>
    </div>`;

  for(const [secKey, sec] of Object.entries(secs)) {
    html += `<div class="section-group"><div class="section-label">${sec.name}</div>`;
    for(const p of sec.params) {
      const limStr = p.limitAbs !== null ? `Limit: ${p.limitDir==='max'?'≤':'≥'} ${p.limitAbs}mm`
                   : p.limitDelta !== null && p.nominal !== null ? `Limit: Δ ≤ ${p.limitDelta}mm`
                   : '';
      const nomStr = p.nominal !== null ? `Nominal: ${p.nominal}mm` : '';
      html += `
        <div class="param-row">
          <div class="param-label">${p.label}</div>
          <div class="param-info">
            ${limStr ? `<div class="param-limit">${limStr}</div>` : ''}
            ${nomStr ? `<div class="param-nominal">${nomStr}</div>` : ''}
          </div>
          <div class="param-input-wrap">
            <input type="number" inputmode="decimal" step="0.01"
              class="param-input" id="pi-${p.id}"
              placeholder="—"
              oninput="onParamInput('${key}','${p.id}',this)">
            <span class="status-icon" id="si-${p.id}">·</span>
          </div>
        </div>`;
    }
    html += `</div>`;
  }

  html += `<div style="height:8px"></div>
    <div style="margin:0 16px 6px;font-size:11px;color:var(--muted);font-family:var(--mono)">
      Ölçüm yoxdursa sahəni boş buraxın.
    </div>
    <div style="height:16px"></div>`;

  // History button
  const recs = DB[key] || [];
  if(recs.length > 0) {
    html += `<div style="margin:0 16px 20px">
      <button class="export-btn" onclick="openHistory('${key}')">
        📋  ${recs.length} Ölçüm Tarixçəsinə Bax ›
      </button>
    </div>`;
  }

  document.getElementById('entry-body').innerHTML = html;
}

function onParamInput(unitKey, paramId, el) {
  const secs = getUnitSections(unitKey);
  let param = null;
  for(const sec of Object.values(secs)) {
    param = sec.params.find(p => p.id === paramId);
    if(param) break;
  }
  if(!param) return;

  const st = paramStatus(param, el.value);
  el.className = 'param-input ' + (st==='ok'?'s-ok':st==='warn'?'s-warn':st==='over'?'s-over':'');
  const si = document.getElementById('si-'+paramId);
  if(si) {
    if(st==='ok')   si.textContent = '✓', si.style.color = 'var(--green)';
    else if(st==='warn') si.textContent = '!', si.style.color = 'var(--yellow)';
    else if(st==='over') si.textContent = '✗', si.style.color = 'var(--red)';
    else si.textContent = '·', si.style.color = 'var(--muted)';
  }
}

// ═══════════════════════════════════════════
//  SAVE ENTRY
// ═══════════════════════════════════════════
function saveEntry() {
  const key = currentUnit;
  const date = document.getElementById('m-date')?.value || new Date().toISOString().split('T')[0];
  const inspector = document.getElementById('m-inspector')?.value || '';
  const prod = document.getElementById('m-prod')?.value || '';
  const hours = document.getElementById('m-hours')?.value || '';

  const secs = getUnitSections(key);
  const v = {};
  let hasAny = false;
  for(const sec of Object.values(secs)) {
    for(const p of sec.params) {
      const el = document.getElementById('pi-'+p.id);
      if(el && el.value !== '') { v[p.id] = parseFloat(el.value); hasAny = true; }
    }
  }

  if(!hasAny) { showToast('Ən azı 1 ölçüm daxil edin', 'err'); return; }

  if(!DB[key]) DB[key] = [];
  DB[key].push({ date, inspector, prod, hours, v, ts: Date.now() });
  save(DB);

  // Check if any over-limit
  const secs2 = getUnitSections(key);
  let overCount = 0;
  for(const sec of Object.values(secs2))
    for(const p of sec.params)
      if(v[p.id] !== undefined && paramStatus(p, v[p.id]) === 'over') overCount++;

  if(overCount > 0) {
    showToast(`⚠ ${overCount} parametr limitdən ARTIQDIR!`, 'err');
  } else {
    showToast('✓ Ölçüm saxlandı', 'ok');
  }

  setTimeout(() => { showScreen('home'); navStack = ['home']; }, 1200);
}

// ═══════════════════════════════════════════
//  HISTORY RENDER
// ═══════════════════════════════════════════
function renderHistory(key) {
  document.getElementById('history-title').textContent = key + ' — Tarixçə';
  const recs = DB[key] || [];
  document.getElementById('history-sub').textContent = recs.length + ' ölçüm';
  const secs = getUnitSections(key);
  const allParams = Object.values(secs).flatMap(s => s.params);

  if(!recs.length) {
    document.getElementById('history-list').innerHTML = '<div class="empty-state"><span class="empty-icon">📋</span>Hələ ölçüm yoxdur</div>';
    return;
  }

  const sorted = [...recs].sort((a,b) => new Date(b.date)-new Date(a.date));
  document.getElementById('history-list').innerHTML = sorted.map((rec, idx) => {
    const realIdx = recs.indexOf(rec); // for delete
    const params = allParams.filter(p => rec.v && rec.v[p.id] !== undefined);
    const paramsHtml = params.map(p => {
      const val = rec.v[p.id];
      const st = paramStatus(p, val);
      const cls = {ok:'hp-ok',warn:'hp-warn',over:'hp-over',empty:'hp-empty'}[st];
      return `<div class="history-param"><div class="hp-label">${p.label}</div><div class="hp-val ${cls}">${val}</div></div>`;
    }).join('');

    // Count over
    const overN = params.filter(p => paramStatus(p, rec.v[p.id]) === 'over').length;
    let badgeHtml = '';
    if(overN > 0) badgeHtml = `<span class="status-pill pill-over">⚠ ${overN} limit</span>`;

    return `
      <div class="history-card">
        <div class="history-card-header">
          <div>
            <div class="history-date">${rec.date} &nbsp; ${badgeHtml}</div>
            <div class="history-meta">${rec.inspector||'—'} · ${rec.prod||'—'} ton · ${rec.hours||'—'} saat</div>
          </div>
          <button class="delete-btn" onclick="deleteRecord('${key}',${realIdx})">✕ Sil</button>
        </div>
        <div class="history-card-body">${paramsHtml||'<span style="color:var(--muted);font-size:12px;font-family:var(--mono)">Məlumat yoxdur</span>'}</div>
      </div>`;
  }).join('');
}

function deleteRecord(key, idx) {
  if(!confirm('Bu ölçümü silmək istədiyinizə əminsiniz?')) return;
  DB[key].splice(idx, 1);
  save(DB);
  renderHistory(key);
  showToast('Ölçüm silindi', 'ok');
}

// ═══════════════════════════════════════════
//  EXPORT RENDER
// ═══════════════════════════════════════════
function renderExport() {
  // Stats
  let totalRecs = 0, overUnits = 0, warnUnits = 0;
  for(const key of ALL_UNITS) {
    totalRecs += (DB[key]||[]).length;
    const st = unitStatus(key);
    if(st==='over') overUnits++;
    else if(st==='warn') warnUnits++;
  }

  document.getElementById('export-body').innerHTML = `
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-n" style="color:var(--blue)">${totalRecs}</div><div class="stat-l">Ölçüm</div></div>
      <div class="stat-box"><div class="stat-n" style="color:var(--red)">${overUnits}</div><div class="stat-l">Limit Keçən</div></div>
      <div class="stat-box"><div class="stat-n" style="color:var(--yellow)">${warnUnits}</div><div class="stat-l">Xəbərdarlıq</div></div>
    </div>

    <div class="export-card">
      <div class="export-card-title">CSV Export — Bütün Məlumat</div>
      <div class="export-card-sub">Bütün avadanlıqların bütün ölçümlərini bir CSV faylında yükləyin. Email ilə göndərin və ya Excel-də açın.</div>
      <button class="export-btn primary" onclick="exportAllCSV()">↓ Bütün Məlumatı Export Et</button>
    </div>

    <div class="export-card">
      <div class="export-card-title">Tək Avadanlıq Export</div>
      <div class="export-card-sub">Seçilmiş avadanlığın ölçümlərini export edin.</div>
      <select class="unit-select" id="export-unit-select">
        ${ALL_UNITS.map(k => `<option value="${k}">${k} (${(DB[k]||[]).length} ölçüm)</option>`).join('')}
      </select>
      <button class="export-btn" onclick="exportUnitCSV()">↓ Seçilmiş Avadanlığı Export Et</button>
    </div>

    <div class="export-card">
      <div class="export-card-title">⚠ Limit Keçənlər — Hesabat</div>
      <div class="export-card-sub">Yalnız limit keçmiş və ya xəbərdarlıq olan son ölçümləri export edin.</div>
      <button class="export-btn" onclick="exportAlertsCSV()">↓ Xəbərdarlıq Hesabatı</button>
    </div>

    <div class="export-card">
      <div class="export-card-title" style="color:var(--red)">Bütün Məlumatı Sil</div>
      <div class="export-card-sub">Diqqət: Bu əməliyyat geri alına bilməz. Silməzdən əvvəl export edin.</div>
      <button class="export-btn danger" onclick="clearAllData()">✕ Bütün Məlumatı Sil</button>
    </div>`;
}

function getAllParams() {
  const seen = new Set();
  const params = [];
  for(const key of ALL_UNITS) {
    const secs = getUnitSections(key);
    for(const sec of Object.values(secs))
      for(const p of sec.params)
        if(!seen.has(p.id)) { seen.add(p.id); params.push(p); }
  }
  return params;
}

function buildCSV(keys) {
  const allParams = getAllParams();
  const rows = ['Avadanlıq,Tarix,Müfəttiş,İstehsal(ton),Saat,' + allParams.map(p=>p.label+'('+p.id+')').join(',')];
  for(const key of keys) {
    for(const rec of (DB[key]||[])) {
      const vals = allParams.map(p => rec.v && rec.v[p.id] !== undefined ? rec.v[p.id] : '');
      rows.push([key, rec.date, rec.inspector||'', rec.prod||'', rec.hours||'', ...vals].join(','));
    }
  }
  return rows.join('\n');
}

function downloadCSV(content, filename) {
  const blob = new Blob(['\uFEFF'+content], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('✓ Export tamamlandı', 'ok');
}

function exportAllCSV() {
  const csv = buildCSV(ALL_UNITS);
  downloadCSV(csv, `asinma_olcum_${today()}.csv`);
}

function exportUnitCSV() {
  const key = document.getElementById('export-unit-select')?.value;
  if(!key) return;
  if(!(DB[key]||[]).length) { showToast('Bu avadanlıqda ölçüm yoxdur', 'err'); return; }
  downloadCSV(buildCSV([key]), `${key}_${today()}.csv`);
}

function exportAlertsCSV() {
  const alertKeys = ALL_UNITS.filter(k => ['over','warn'].includes(unitStatus(k)));
  if(!alertKeys.length) { showToast('Heç bir xəbərdarlıq yoxdur', 'ok'); return; }
  downloadCSV(buildCSV(alertKeys), `xeberdarliqqlar_${today()}.csv`);
}

function clearAllData() {
  if(!confirm('Bütün ölçüm məlumatları SİLİNƏCƏK. Əminsiniz?')) return;
  DB = {};
  save(DB);
  renderExport();
  showToast('Bütün məlumat silindi', 'ok');
}

function today() { return new Date().toISOString().split('T')[0]; }

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast t-${type} show`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.classList.remove('show'); }, 2800);
}

// ═══════════════════════════════════════════
//  PWA INSTALL
// ═══════════════════════════════════════════
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const wrap = document.getElementById('install-banner-wrap');
  wrap.innerHTML = `
    <div class="install-banner">
      <div class="install-banner-text">📲 Bu proqramı telefonunuza quraşdıra bilərsiniz</div>
      <button class="install-btn" onclick="installApp()">Quraşdır</button>
    </div>`;
});

function installApp() {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('install-banner-wrap').innerHTML = '';
  });
}

// ═══════════════════════════════════════════
//  SERVICE WORKER
// ═══════════════════════════════════════════
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
renderHome();
</script>
